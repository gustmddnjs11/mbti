name: 매일 인스타 자동 포스팅

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 08:00 KST (UTC 23:00)
  workflow_dispatch: {}     # 수동 실행 버튼 (테스트용)

permissions:
  contents: write

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 한글 & 이모지 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji

      - name: 의존성 설치
        working-directory: automation
        run: npm install

      - name: 카드 이미지 렌더링
        working-directory: automation
        env:
          IG_HANDLE: ${{ vars.IG_HANDLE }}
        run: node render.mjs

      - name: 이미지 커밋 & 푸시
        run: |
          git config user.name "mbti-bot"
          git config user.email "actions@users.noreply.github.com"
          git add posts
          git commit -m "daily cards $(date -u +%Y-%m-%d)" || echo "변경 없음"
          git push

      - name: 인스타그램 발행
        working-directory: automation
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: node post.mjs
