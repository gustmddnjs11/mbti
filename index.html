<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF8A6B">
<title>논쟁의 민족 · 같은 상황, 다른 생각</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root{
    --bg1:#FFF3EC; --bg2:#FCEDF4; --bg3:#F3EEFF;
    --coral:#FF8A6B; --coral2:#FF7AA6; --coralInk:#C7593A;
    --lav:#9385F0; --lavInk:#6A56C8;
    --ink:#4A3A55; --ink2:#9A86A4; --line:#F0E6F2;
    --pink:#FF7AA6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; min-height:100%;}
  body{
    font-family:'Gowun Dodum','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    color:var(--ink);
    background:linear-gradient(168deg,var(--bg1) 0%,var(--bg2) 52%,var(--bg3) 100%);
    background-attachment:fixed;
    display:flex; justify-content:center;
  }
  .jua{font-family:'Jua','Apple SD Gothic Neo',sans-serif;}
  /* blobs */
  .blob{position:fixed; border-radius:50%; filter:blur(8px); pointer-events:none; z-index:0;}
  .blob.a{top:-60px; right:-50px; width:220px; height:220px; background:radial-gradient(circle at 30% 30%,#FFD9C7,#FFB7C4); opacity:.45; animation:blob 9s ease-in-out infinite;}
  .blob.b{bottom:30px; left:-70px; width:240px; height:240px; background:radial-gradient(circle at 40% 40%,#D7CCFF,#B9C6FF); opacity:.4; animation:blob 11s ease-in-out infinite 1s;}
  @keyframes blob{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(8px,-12px) scale(1.06);}}
  @keyframes popIn{0%{transform:scale(.4);opacity:0;}60%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}
  @keyframes floatUp{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  #app{position:relative; z-index:1; width:100%; max-width:412px; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; padding:0 20px 10px;}
  .float{animation:floatUp .5s ease both;}
  .center{flex:1; display:flex; flex-direction:column; justify-content:center;}

  /* home */
  .applogo{width:46px;height:46px;margin:0 auto 7px;border-radius:15px;background:linear-gradient(145deg,#FF9E8A,#FF7AA6);
           display:flex;align-items:center;justify-content:center;font-size:25px;box-shadow:0 7px 16px rgba(255,122,166,.3);}
  h1{font-size:28px;margin:0;color:var(--ink);letter-spacing:-1px;line-height:1.2;text-align:center;}
  .sub{text-align:center;font-size:13px;color:var(--ink2);line-height:1.45;margin:6px 0 0;}
  .modecard{all:unset;cursor:pointer;box-sizing:border-box;display:flex;align-items:center;gap:11px;padding:9px 14px;border-radius:17px;margin-bottom:7px;transition:transform .12s;}
  .modecard:active{transform:scale(.97);}
  .modecard.solo{background:linear-gradient(135deg,#FFF1EA,#FFE4DA);border:1.5px solid #FFD3C2;box-shadow:0 10px 24px rgba(255,138,107,.16);}
  .modecard.duo{background:linear-gradient(135deg,#F1ECFF,#E6E0FF);border:1.5px solid #D2C7FF;box-shadow:0 10px 24px rgba(147,133,240,.16);}
  .modeic{width:46px;height:46px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;color:#fff;}
  .modecard.solo .modeic{background:var(--coral);box-shadow:0 8px 16px rgba(255,138,107,.35);}
  .modecard.duo .modeic{background:var(--lav);box-shadow:0 8px 16px rgba(147,133,240,.35);}
  .modet{font-size:18px;} .modecard.solo .modet{color:var(--coralInk);} .modecard.duo .modet{color:var(--lavInk);}
  .moded{font-size:11.5px;color:var(--ink2);margin-top:2px;}
  .foot{text-align:center;font-size:12px;color:#C0AEC8;line-height:1.55;}

  /* topbar / progress */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:54px 2px 6px;}
  .back{all:unset;cursor:pointer;font-size:14px;color:#A593AE;padding:6px 4px;}
  .modepill{display:flex;align-items:center;gap:6px;background:#FFFFFFcc;padding:6px 12px;border-radius:999px;font-size:12px;color:#7B6A86;box-shadow:0 4px 12px rgba(120,90,140,.08);}
  .progress{height:6px;border-radius:999px;background:#FFFFFF99;overflow:hidden;margin:6px 2px 0;}
  .progress>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#FF9E8A,#9385F0);transition:width .35s;}
  .pmeta{font-size:12px;color:#B0A0B8;margin:8px 2px 0;}
  .catpill{font-size:12.5px;color:var(--coralInk);background:#FFFFFFcc;display:inline-block;padding:5px 12px;border-radius:999px;margin:14px 2px 0;box-shadow:0 4px 12px rgba(120,90,140,.06);}
  .q{font-size:25px;line-height:1.4;color:var(--ink);margin:14px 2px 20px;letter-spacing:-.5px;}

  /* options: This-or-That */
  .tot{display:flex;gap:13px;}
  .optbtn{all:unset;cursor:pointer;box-sizing:border-box;position:relative;transition:transform .12s,opacity .2s;}
  .optbtn:active{transform:scale(.97);}
  .totcard{flex:1;border-radius:26px;padding:26px 12px;text-align:center;border:2px solid;}
  .c-coral{background:linear-gradient(160deg,#FFF1EA,#FFE3D8);border-color:#FFD0BD;}
  .c-lav{background:linear-gradient(160deg,#F1ECFF,#E4DEFF);border-color:#D0C5FF;}
  .tot-em{font-size:44px;line-height:1;margin-bottom:13px;}
  .tot-lab{font-size:18px;line-height:1.3;}
  .c-coral .tot-lab{color:var(--coralInk);} .c-lav .tot-lab{color:var(--lavInk);}
  /* options: stack (3~4지선다) */
  .stack{display:flex;flex-direction:column;gap:11px;}
  .scard{display:flex;align-items:center;gap:13px;border-radius:20px;padding:16px;border:2px solid #F2E2EA;background:#FFFFFFdd;font-size:16px;color:var(--ink);text-align:left;width:100%;}
  .scard .s-em{font-size:24px;flex-shrink:0;}
  .scard .s-lab{flex:1;line-height:1.35;}
  .scard.sel{border-color:var(--coral);background:#fff;}
  /* selected/dim states */
  .optbtn.dim{opacity:.4;}
  .check{position:absolute;top:-10px;right:-8px;width:30px;height:30px;border-radius:50%;color:#fff;display:none;align-items:center;justify-content:center;font-size:16px;}
  .totcard.sel{border-width:3px;} .c-coral.sel{border-color:var(--coral);} .c-lav.sel{border-color:var(--lav);}
  .c-coral .check{background:var(--coral);} .c-lav .check{background:var(--lav);}
  .optbtn.sel .check{display:flex;animation:popIn .35s ease both;}
  .scard .schk{margin-left:auto;color:var(--coral);font-size:18px;display:none;}
  .scard.sel .schk{display:block;}

  /* guide */
  .guide{margin-top:22px;padding:19px;border-radius:24px;background:#FFFFFFd9;border:1.5px solid var(--line);box-shadow:0 8px 20px rgba(120,90,140,.08);animation:floatUp .4s ease both;}
  .guide .gt{display:flex;align-items:center;gap:8px;font-size:16px;color:var(--pink);margin-bottom:10px;}
  .guide .gx{font-size:14.5px;color:#6B5A74;line-height:1.6;}

  /* nav */
  .nav{margin-top:auto;display:flex;gap:12px;padding-top:24px;}
  .btn{all:unset;cursor:pointer;box-sizing:border-box;text-align:center;transition:transform .12s;}
  .btn:active{transform:scale(.97);}
  .btn-next{flex:1;padding:16px;border-radius:999px;background:linear-gradient(135deg,#FF9E8A,#FF7AA6);color:#fff;font-size:17px;box-shadow:0 10px 22px rgba(255,122,166,.34);}
  .btn-ghost{padding:16px 22px;border-radius:999px;background:#FFFFFFcc;color:#9A86A4;font-size:15px;border:1.5px solid #EFE3F0;}
  .btn-full{width:100%;padding:17px;border-radius:22px;background:linear-gradient(135deg,#FF9E8A,#FF7AA6);color:#fff;font-size:17px;box-shadow:0 10px 22px rgba(255,122,166,.3);margin-top:8px;}
  .btn-soft{width:100%;padding:15px;border-radius:22px;background:#FFFFFFcc;color:var(--lavInk);font-size:15px;border:1.5px solid #E6DEF6;margin-top:10px;}

  /* duo turn */
  .turn{text-align:center;}
  .turn .big{font-size:74px;animation:popIn .5s ease both;}
  .turn .who{font-size:30px;margin:10px 0 6px;color:var(--ink);}
  .turn .warn{font-size:15px;color:var(--ink2);margin-bottom:30px;}

  /* setup fields */
  .field{width:100%;border:2px solid var(--line);border-radius:16px;padding:15px;font-size:16px;font-family:inherit;margin-bottom:12px;outline:none;background:#fff;color:var(--ink);}
  .field:focus{border-color:var(--coral);}
  .panel{background:#FFFFFFd9;border:1.5px solid var(--line);border-radius:26px;padding:22px;box-shadow:0 10px 24px rgba(120,90,140,.1);}
  .hint{font-size:13.5px;color:var(--ink2);line-height:1.6;background:#FFF6FB;border-radius:16px;padding:14px;margin-bottom:14px;}

  /* reveal / result */
  .reveal-row{display:flex;gap:12px;margin:6px 0 14px;}
  .person{flex:1;border-radius:22px;padding:16px 12px;text-align:center;border:2px solid;}
  .person.l{background:linear-gradient(160deg,#FFF1EA,#FFE3D8);border-color:#FFD0BD;}
  .person.r{background:linear-gradient(160deg,#F1ECFF,#E4DEFF);border-color:#D0C5FF;}
  .person .nm{font-size:13px;color:var(--ink2);margin-bottom:8px;}
  .person .pem{font-size:30px;display:block;margin-bottom:5px;}
  .person .pl{font-size:14.5px;line-height:1.3;}
  .person.l .pl{color:var(--coralInk);} .person.r .pl{color:var(--lavInk);}
  .verdict{text-align:center;font-size:18px;margin:4px 0 14px;}
  .verdict.same{color:#2BBE8A;} .verdict.diff{color:var(--pink);}
  .bar{margin:14px 0;}
  .bar .lbl{display:flex;justify-content:space-between;font-size:13px;color:var(--ink2);margin-bottom:6px;}
  .bar .track{height:12px;background:#FFEDE6;border-radius:9px;overflow:hidden;}
  .bar .fill{height:100%;border-radius:9px;}
  .res-type{text-align:center;font-size:42px;letter-spacing:2px;color:var(--coral);margin:6px 0;}
  .res-tag{text-align:center;color:var(--ink2);font-size:15px;line-height:1.6;margin-bottom:16px;}
  /* debate mode */
  .modecard.debate{background:linear-gradient(135deg,#FFF0F6,#FFE2EE);border:1.5px solid #FFCBE0;box-shadow:0 10px 24px rgba(255,122,166,.16);}
  .modecard.silly,.modecard.guess{background:linear-gradient(135deg,#EAF8F3,#DDF3FF);border:1.5px solid #C5E8E0;box-shadow:0 10px 24px rgba(63,192,168,.16);}
  .modecard.insta{background:linear-gradient(135deg,#FFF0F6,#F3E9FF);border:1.5px solid #F0CFE4;box-shadow:0 10px 24px rgba(193,53,132,.14);}
  .grow{background:#FFFFFFcc;border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:8px;}
  .gq{font-size:14px;color:var(--ink);margin-bottom:7px;line-height:1.4;}
  .gres{display:flex;align-items:center;gap:9px;font-size:13px;}
  .gtick{width:20px;height:20px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:12px;flex-shrink:0;}
  .grow.gok .gtick{background:#2BBE8A;} .grow.gbad .gtick{background:var(--pink);}
  .gtxt{color:var(--ink2);line-height:1.4;}
  .tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px;}
  .tcell{all:unset;cursor:pointer;box-sizing:border-box;text-align:center;padding:12px 2px;border-radius:16px;background:#FFFFFFdd;border:2px solid #F2E2EA;transition:transform .1s;}
  .tcell:active{transform:scale(.94);}
  .tcell.sel{border-color:var(--coral);background:#fff;}
  .tcell .tc{font-size:15px;color:var(--ink);}
  .tcell .tn{font-size:9.5px;color:var(--ink2);margin-top:2px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0 2px;}
  .chip{font-size:13px;padding:7px 13px;border-radius:999px;}
  .chip.same{background:#E3F7EE;color:#2BBE8A;}
  .chip.diff{background:#FFE7F0;color:var(--pink);}
</style>
</head>
<body>
<div class="blob a"></div><div class="blob b"></div>
<div id="app"></div>

<script>
/* ===== 데이터 ===== */
const AX={S:'현실파',N:'상상파',T:'이성파',F:'감성파',E:'활발',I:'차분',J:'계획',P:'즉흥'};
const CARDS=[
  {cat:'🧊 아이스브레이커',q:'처음 본 사람과 단둘이 엘리베이터. 나는?',opts:[{em:'💬',lab:'가볍게 말 건넨다',ax:'E'},{em:'📱',lab:'폰 보며 어색함 회피',ax:'I'}],guide:'첫 대화의 물꼬! 답만 비교해도 바로 웃음이 터져요.'},
  {cat:'🧊 아이스브레이커',q:'첫인상에서 가장 먼저 보는 것은?',opts:[{em:'👀',lab:'외모·스타일·분위기',ax:'S'},{em:'🧠',lab:'말투·생각·느낌',ax:'N'}],guide:'사람 보는 기준이 달라요. 서로의 첫인상을 솔직하게 나눠보세요.'},
  {cat:'🧊 아이스브레이커',q:'회식·모임 자리, 나는?',opts:[{em:'🔥',lab:'끝까지 남아 분위기 즐김',ax:'E'},{em:'🚪',lab:'적당히 즐기고 먼저 빠짐',ax:'I'}],guide:'먼저 가는 건 무례가 아니라 충전 방식! 에너지 한계가 사람마다 달라요.'},
  {cat:'🧊 아이스브레이커',q:'내 첫인상 vs 진짜 나, 차이는?',opts:[{em:'🪞',lab:'거의 같음',ax:'E'},{em:'🎁',lab:'알수록 반전 있음',ax:'I'}],guide:'다 같이 한 번씩 답하면 서로를 빠르게 알게 되는 마법의 카드.'},
  {cat:'💞 연애',q:'연인이 "한 달만 시골에서 살아보자"고 한다. 첫 반응은?',opts:[{em:'🧾',lab:'"생활비랑 일은?"',ax:'S'},{em:'✨',lab:'"오 좋아! 어떤 시골?"',ax:'N'}],guide:'현실파 vs 상상파! "되려면 뭐가 필요할까?"로 같이 그려보면 싸움이 계획이 돼요.'},
  {cat:'💞 연애',q:'사랑한다는 표현, 나는?',opts:[{em:'🗣️',lab:'말로 자주 표현',ax:'F'},{em:'🤲',lab:'행동·챙김으로',ax:'T'}],guide:'표현 방식이 다르면 "사랑이 식었나" 오해해요. 서로의 사랑 신호를 알려주기.'},
  {cat:'💞 연애',q:'연인이 회사에서 부당한 일을 당했다. 내 첫 반응은?',opts:[{em:'🛠️',lab:'"이렇게 대응해" 해결책',ax:'T'},{em:'🫂',lab:'"속상했겠다" 공감',ax:'F'}],guide:'T는 돕고 싶어 조언, F는 위로를 원해요. "조언 줄까, 그냥 들어줄까?" 먼저 물어보기.'},
  {cat:'💞 연애',q:'기념일, 나에게 중요도는?',opts:[{em:'📅',lab:'무조건 챙겨야지',ax:'S'},{em:'💭',lab:'마음이 중요하지',ax:'N'}],guide:'한쪽은 기억으로 사랑을 증명해요. 기념일 무게가 다르면 미리 합의하면 서운함 예방.'},
  {cat:'💞 연애',q:'싸운 날 밤, 나는?',opts:[{em:'🌙',lab:'풀릴 때까지 대화',ax:'J'},{em:'😴',lab:'일단 자고 내일',ax:'P'}],guide:'즉시 해결 vs 식히고 대화. "내일 아침에 얘기"처럼 룰을 정해두면 좋아요.'},
  {cat:'💞 연애',q:'연인이 친구들이랑 더 노는 것 같다. 나는?',opts:[{em:'🙋',lab:'"나도 같이 가자!"',ax:'E'},{em:'🛋️',lab:'"다녀와~" 내 시간',ax:'I'}],guide:'충전 방식이 달라요. 혼자 시간 = 사랑이 식은 게 아님을 서로 이해하기.'},
  {cat:'💘 썸',q:'썸 상대가 6시간째 답장이 없다. 머릿속은?',opts:[{em:'😎',lab:'"바쁘겠지" 별 생각 없음',ax:'T'},{em:'😰',lab:'"내가 뭐 실수했나…"',ax:'F'}],guide:'같은 상황, 정반대 머릿속! 불안형에게 "답장 늦어도 마음 안 변해" 한마디가 커요.'},
  {cat:'💘 썸',q:'이게 썸인지 사귀는 건지 애매하다. 나는?',opts:[{em:'❓',lab:'"우리 뭐야?" 확실히',ax:'J'},{em:'🌊',lab:'좋은 흐름이니 즐김',ax:'P'}],guide:'정의 욕구가 달라요. P에게 J의 질문은 압박이 아니라 불안 해소라는 걸 알려주기.'},
  {cat:'💘 썸',q:'썸탈 때 가장 설레는 순간은?',opts:[{em:'👁️',lab:'지금 눈 마주치는 순간',ax:'S'},{em:'🔮',lab:'잘 되면 어떨까 상상',ax:'N'}],guide:'현재형 설렘 vs 미래형 설렘. 서로의 설렘 포인트를 알면 데이트가 달콤해져요.'},
  {cat:'💘 썸',q:'호감 표현, 나는?',opts:[{em:'📣',lab:'적극적으로 티 냄',ax:'E'},{em:'🫥',lab:'은근히, 티 안 나게',ax:'I'}],guide:'표현 온도차로 오해가 생기기 쉬워요. I의 작은 신호도 큰 호감일 수 있어요.'},
  {cat:'⚡ 갈등',q:'친구가 울면서 고민을 말한다. 첫마디는?',opts:[{em:'🧭',lab:'"어떻게 할 거야?"',ax:'T'},{em:'💗',lab:'"많이 힘들었겠다"',ax:'F'}],guide:'갈등 1위 소재! T는 사랑해서 해결하려 하고 F는 공감을 원해요. 둘 다 애정 표현이에요.'},
  {cat:'⚡ 갈등',q:'모임에서 누가 명백히 틀린 말을 한다. 나는?',opts:[{em:'☝️',lab:'바로 정정한다',ax:'T'},{em:'🤐',lab:'분위기 봐서 넘어감',ax:'F'}],guide:'정확성 vs 분위기. 지적은 미움이 아니라 진실 사랑, 침묵은 배려예요.'},

let duo={stage:'A',aPick:null,sameCnt:0,diffCnt:0};
let debate={a:null,b:null,deck:[],i:0,agree:false};
const TYPES=[
 ['INTJ','전략가'],['INTP','논리술사'],['ENTJ','지휘관'],['ENTP','변론가'],
 ['INFJ','옹호자'],['INFP','중재자'],['ENFJ','선도자'],['ENFP','활동가'],
 ['ISTJ','현실주의'],['ISFJ','수호자'],['ESTJ','경영자'],['ESFJ','집정관'],
 ['ISTP','장인'],['ISFP','모험가'],['ESTP','사업가'],['ESFP','연예인']];
const app=document.getElementById('app');
function rs(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ===== 옵션 렌더 ===== */
function optsHTML(c,fn){
  if(c.opts.length===2){
    return `<div class="tot">`+c.opts.map((o,i)=>
      `<button class="optbtn totcard ${i===0?'c-coral':'c-lav'}" onclick="${fn}(${i})">
        <div class="tot-em">${o.em}</div><div class="tot-lab jua">${o.lab}</div><i class="check">✓</i>
      </button>`).join('')+`</div>`;
  }
  return `<div class="stack">`+c.opts.map((o,i)=>
    `<button class="optbtn scard" onclick="${fn}(${i})"><span class="s-em">${o.em}</span><span class="s-lab">${o.lab}</span><span class="schk">✓</span></button>`
  ).join('')+`</div>`;
}
function lockOpts(i){document.querySelectorAll('.optbtn').forEach((b,k)=>{b.onclick=null;if(k===i)b.classList.add('sel');else b.classList.add('dim');});}

/* ===== 혼자 ===== */
function startSolo(){mode='solo';deck=rs(CARDS);idx=0;scores={S:0,N:0,T:0,F:0,E:0,I:0,J:0,P:0};renderSolo();}
function renderSolo(){
  const c=deck[idx];
  app.innerHTML=`
   <div class="topbar"><button class="back" onclick="home()">‹ 홈</button>
     <div class="modepill">🧍 혼자 모드</div></div>
   <div class="progress"><i style="width:${idx/deck.length*100}%"></i></div>
   <div class="pmeta">${idx+1} / ${deck.length}</div>
   <span class="catpill">${c.cat}</span>
   <h2 class="q jua">${c.q}</h2>
   <div id="optwrap">${optsHTML(c,'soloPick')}</div>
   <div id="extra"></div>`;
}
function soloPick(i){
  const c=deck[idx];scores[c.opts[i].ax]=(scores[c.opts[i].ax]||0)+1;lockOpts(i);
  document.getElementById('extra').innerHTML=`
   <div class="guide"><div class="gt jua"><span>🌷</span>이런 얘기 해봐요</div><div class="gx">${c.guide}</div></div>
   <button class="btn btn-full" onclick="soloNext()">${idx+1<deck.length?'다음 카드 →':'결과 보기 ✨'}</button>`;
}
function soloNext(){idx++;idx<deck.length?renderSolo():soloResult();}
function soloResult(){
  const pair=[['E','I'],['S','N'],['T','F'],['J','P']];
  const type=pair.map(([a,b])=>scores[a]>=scores[b]?a:b).join('');
  const bars=pair.map(([a,b])=>{
    const ta=scores[a]||0,tb=scores[b]||0,tot=ta+tb||1,pa=Math.round(ta/tot*100),lead=pa>=50;
    return `<div class="bar"><div class="lbl"><span style="color:${lead?axc(a):''}">${a} ${AX[a]} ${pa}%</span><span style="color:${!lead?axc(b):''}">${100-pa}% ${AX[b]} ${b}</span></div>
     <div class="track"><div class="fill" style="width:${pa}%;background:${axc(a)}"></div></div></div>`;
  }).join('');
  app.innerHTML=`
   <div class="topbar"><button class="back" onclick="home()">‹ 홈</button><div class="modepill">🧍 결과</div></div>
   <div class="panel float" style="margin-top:14px">
     <div class="res-type jua">${type}</div>
     <div class="res-tag">${typeTag(type)}</div>
     ${bars}
     <div class="guide" style="margin-top:14px"><div class="gt jua"><span>💛</span>참고</div><div class="gx">이건 이 카드들에서 고른 답의 경향일 뿐이에요. 진짜 MBTI 검사와 달라도 괜찮아요 :)</div></div>
     <button class="btn btn-full" onclick="startSolo()">다시 하기 🔄</button>
     <button class="btn btn-soft" onclick="setupDuo()">친구랑 함께하기 🧑‍🤝‍🧑</button>
   </div>`;
}

     <input class="field" id="n2" placeholder="두 번째 사람" maxlength="6">
     <div class="hint">📱 한 폰을 번갈아 보며 같은 질문에 각자 답해요. 상대가 답할 땐 화면을 보지 마세요!</div>

}
function startDuo(){
  const n1=(document.getElementById('n1').value||'1번').trim(),n2=(document.getElementById('n2').value||'2번').trim();
  duoNames=[n1||'1번',n2||'2번'];const cnt=parseInt(document.getElementById('cnt').value);
  mode='duo';deck=rs(CARDS).slice(0,cnt);idx=0;duo={stage:'A',aPick:null,sameCnt:0,diffCnt:0};duoTurn();
}
function duoTurn(){
  const who=duo.stage==='A'?duoNames[0]:duoNames[1],other=duo.stage==='A'?duoNames[1]:duoNames[0];
  app.innerHTML=`
   <div class="topbar"><button class="back" onclick="home()">‹ 홈</button><div class="modepill">🧑‍🤝‍🧑 ${idx+1}/${deck.length}</div></div>
   <div class="center turn float">
     <div class="big">${duo.stage==='A'?'🙋':'🙋‍♀️'}</div>
     <div class="who jua">${who} 차례</div>
     <div class="warn">${other}님은 화면을 보지 마세요 🙈</div>
     <button class="btn btn-full" onclick="duoCard()">준비됐어요, 카드 보기</button>
   </div>`;
}
function duoCard(){
  const c=deck[idx],who=duo.stage==='A'?duoNames[0]:duoNames[1];
  app.innerHTML=`
   <div class="topbar"><div class="modepill">${who} 차례</div><div class="modepill">${idx+1}/${deck.length}</div></div>
   <div class="progress"><i style="width:${idx/deck.length*100}%"></i></div>
   <span class="catpill">${c.cat}</span>
   <h2 class="q jua">${c.q}</h2>
   <div id="optwrap">${optsHTML(c,'duoPick')}</div>`;
}
function duoPick(i){if(duo.stage==='A'){duo.aPick=i;duo.stage='B';duoTurn();}else duoReveal(duo.aPick,i);}
function duoReveal(ai,bi){
  const c=deck[idx],same=ai===bi;same?duo.sameCnt++:duo.diffCnt++;
  const cell=(cl,nm,o)=>`<div class="person ${cl}"><div class="nm">${nm}</div><span class="pem">${o.em}</span><div class="pl">${o.lab}</div></div>`;
  app.innerHTML=`
   <div class="topbar"><button class="back" onclick="home()">‹ 홈</button><div class="modepill">결과 공개 · ${idx+1}/${deck.length}</div></div>
   <span class="catpill">${c.cat}</span>
   <h2 class="q jua" style="font-size:20px">${c.q}</h2>
   <div class="reveal-row">${cell('l',duoNames[0],c.opts[ai])}${cell('r',duoNames[1],c.opts[bi])}</div>
   <div class="verdict jua ${same?'same':'diff'}">${same?'💚 똑같이 골랐어요!':'💥 서로 다르게 골랐네요!'}</div>
   <div class="guide"><div class="gt jua"><span>🌷</span>이런 얘기 해봐요</div><div class="gx">${c.guide}</div></div>
   <button class="btn btn-full" onclick="duoNext()">${idx+1<deck.length?'다음 카드 →':'최종 결과 ✨'}</button>`;
}
function duoNext(){idx++;duo.stage='A';duo.aPick=null;idx<deck.length?duoTurn():duoResult();}
function duoResult(){
  const tot=duo.sameCnt+duo.diffCnt,pct=Math.round(duo.sameCnt/tot*100);let v,e;
  if(pct>=70){v='환상의 케미! 통하는 게 정말 많네요 💞';e='🥰';}
  else if(pct>=45){v='적당히 닮고 적당히 달라요. 대화가 제일 재밌는 사이! 🔥';e='😎';}
  else{v='서로 정반대! 그래서 더 배울 게 많은 조합이에요 ✨';e='🌗';}
  app.innerHTML=`
   <div class="topbar"><button class="back" onclick="home()">‹ 홈</button><div class="modepill">최종 결과</div></div>
   <div class="panel float" style="margin-top:14px;text-align:center">
     <div style="font-size:64px;animation:popIn .5s ease both">${e}</div>
     <div class="res-type jua" style="font-size:28px">${duoNames[0]} ✕ ${duoNames[1]}</div>
     <div class="bar" style="text-align:left;margin-top:18px">
       <div class="lbl"><span style="color:#2BBE8A">💚 같은 답 ${duo.sameCnt}</span><span style="color:var(--pink)">💥 다른 답 ${duo.diffCnt}</span></div>
       <div class="track"><div class="fill" style="width:${pct}%;background:#2BBE8A"></div></div>
     </div>
     <div class="res-tag" style="margin-top:18px;color:var(--ink);font-size:17px">${v}</div>
     <div class="res-tag">생각이 같으면 편하고, 다르면 더 재밌어요.<br>달랐던 카드들로 대화를 이어가 보세요!</div>
     <button class="btn btn-full" onclick="setupDuo()">또 하기 🔄</button>
     <button class="btn btn-soft" onclick="home()">처음으로</button>
   </div>`;
}

/* ===== MBTI 토론 ===== */
function setupDebate(){debate={a:null,b:null,deck:[],i:0,agree:false};debatePick(0);}
function debatePick(which){
  const title=which===0?'첫 번째 사람의 MBTI는?':'두 번째 사람의 MBTI는?';
  const picked=which===1?`<div class="chips"><span class="chip same">1번 · ${debate.a}</span></div>`:'';
  const grid=TYPES.map(([t,n])=>`<button class="tcell ${(which===0?debate.a:debate.b)===t?'sel':''}" onclick="debateSet(${which},'${t}')"><div class="tc jua">${t}</div><div class="tn">${n}</div></button>`).join('');
  app.innerHTML=`
   <div class="topbar"><button class="back" onclick="${which===0?'home()':'debatePick(0)'}">‹ ${which===0?'홈':'이전'}</button><div class="modepill">💑 MBTI 토론</div></div>
   <div style="margin-top:14px">
     <h2 class="q jua" style="font-size:22px;margin:0 0 4px">${title}</h2>
     <p class="moded" style="margin:0 0 10px">모르면 먼저 '혼자 모드'로 알아봐도 돼요</p>

   </div>`;
}
function debateSet(which,t){if(which===0){debate.a=t;debatePick(1);}else{debate.b=t;debateAnalysis();}}
function debateAnalysis(){
  const A=debate.a,B=debate.b,axesP=[['E','I'],['S','N'],['T','F'],['J','P']];
  let diff=0;
  const chips=axesP.map(([x,y])=>{const la=A.includes(x)?x:y,lb=B.includes(x)?x:y,same=la===lb;if(!same)diff++;return `<span class="chip ${same?'same':'diff'}">${la}${same?'=':'↔'}${lb}</span>`;}).join('');
  const labels=['쌍둥이 같은 사이 👯','닮은 듯 다른 사이 🪞','밀당 케미 ⚡','자석 같은 사이 ✨','완전 정반대 🌗'];
  const descs=['말 안 해도 통하는 짝! 토론보다 공감이 많을 거예요.','대부분 잘 맞고, 한 가지에서 살짝 달라요.','적당히 닮고 적당히 달라서 대화가 제일 재밌는 사이.','정반대가 많아 끌리고, 서로 배울 게 많은 짝.','모든 게 정반대! 가장 새로운 세상을 보여주는 짝이에요.'];
  const tips={EI:'한 명은 함께, 한 명은 혼자 충전해요. 만남 빈도를 솔직히 맞춰보기.',SN:'현실성 vs 가능성. "안 돼"보다 "되려면 뭐가 필요할까?"로 얘기하기.',TF:'해결 vs 공감. "조언 줄까, 그냥 들어줄까?" 먼저 물어보기.',JP:'계획 vs 즉흥. 큰 틀만 정하고 디테일은 여지를 두기.'};
  const pk={E:'EI',I:'EI',S:'SN',N:'SN',T:'TF',F:'TF',J:'JP',P:'JP'};
  const diffTips=axesP.filter(([x,y])=>(A.includes(x)?x:y)!==(B.includes(x)?x:y)).map(([x])=>`<div class="gx" style="margin-bottom:8px">• ${tips[pk[x]]}</div>`).join('')||'<div class="gx">달라서 부딪힐 축이 거의 없어요. 그만큼 편한 사이!</div>';
  app.innerHTML=`
   <div class="topbar"><button class="back" onclick="setupDebate()">‹ 다시</button><div class="modepill">💑 MBTI 토론</div></div>
   <div class="panel float" style="margin-top:14px">
     <div class="res-type jua" style="font-size:30px">${A} ✕ ${B}</div>
     <div class="chips">${chips}</div>
     <div class="res-tag jua" style="color:var(--ink);font-size:18px;margin-top:10px;margin-bottom:2px">${labels[diff]}</div>
     <div class="res-tag">${descs[diff]}</div>
     <div class="guide"><div class="gt jua"><span>🌷</span>이렇게 대화해봐요</div>${diffTips}</div>
     <button class="btn btn-full" onclick="debateThemeSelect()">토론 주제 고르기 🃏</button>
   </div>`;
}
const AXW={T:1.5,F:1.5,S:1.3,N:1.3,J:1.0,P:1.0,E:0.7,I:0.7};
const DEBATE_THEMES=[
 {key:'relation',emoji:'💞',label:'관계 토론',desc:'연애·우정·일상 속 진짜 차이',pill:'💞 관계 토론'},
 {key:'silly',emoji:'🌪️',label:'엉뚱 토론',desc:'정답 없는 빵 터지는 논쟁',pill:'🌪️ 엉뚱 논쟁'},
 {key:'horror',emoji:'👻',label:'공포·스릴러',desc:'좀비·귀신 생존 속 선택',pill:'👻 공포·스릴러'},
 {key:'whatif',emoji:'🪄',label:'만약에 시리즈',desc:'초능력·상상 가정 토론',pill:'🪄 만약에'},
 {key:'dilemma',emoji:'⚖️',label:'딜레마 토론',desc:'정답 없는 가치관 충돌',pill:'⚖️ 딜레마'},
];
function themeMeta(k){return DEBATE_THEMES.find(t=>t.key===k)||DEBATE_THEMES[0];}
function dLean(type,opts){return opts.findIndex(o=>type.includes(o.ax));}
// 콘텐츠분석에서 '논쟁 약함'으로 분류된 질문 제외(호불호·반복)
const BLOCK=new Set([
  '민트초코, 너의 선택은?','탕수육, 소스는?','파인애플 피자, 인정?','여름 냉면, 너의 선택?','중국집에서 너는?',
  '투명인간이 된다면 가장 먼저?','순간이동 능력이 생긴다면?','시간정지 능력, 멈춘 세상에서?','하늘을 날 수 있다면?','무인도에 딱 하나 가져간다면?',
  '식당이 거스름돈 5만원을 더 줬다. 너는?','무인 가판대, 양심껏 돈 내라고 한다. 아무도 안 본다. 너는?','모두가 규칙을 어기는데 나만 지킨다. 손해다. 너는?',
  '좀비 떼와 마주쳤다. 작전은?',
]);
function themeItems(theme){
  let arr=[];
  if(theme==='relation')arr=CARDS.filter(c=>c.opts.length===2).map(c=>({q:c.q,cat:c.cat,a:c.opts[0],b:c.opts[1],note:c.guide}));
  else if(theme==='silly'){
    const old=SILLY.filter(s=>SILLY_AX[s.q]).map(s=>({q:s.q,a:{...s.a,ax:SILLY_AX[s.q][0]},b:{...s.b,ax:SILLY_AX[s.q][1]},note:s.heat}));
    arr=old.concat(SILLY2,SILLY3);
  }
  else if(theme==='horror')arr=HORROR;
  else if(theme==='whatif')arr=WHATIF.concat(WHATIF2);
  else if(theme==='dilemma')arr=DILEMMA.concat(DILEMMA2,VALUES);
  return arr.filter(it=>!BLOCK.has(it.q));
}
function debateThemeSelect(){
  const cards=DEBATE_THEMES.map(t=>`<button class="modecard" style="background:#fff;border:1.5px solid var(--line);box-shadow:0 6px 16px rgba(120,90,140,.08);margin-bottom:12px" onclick="startDebateCards('${t.key}')">
     <div class="modeic" style="background:linear-gradient(145deg,#FF9E8A,#9385F0);font-size:25px">${t.emoji}</div>
     <div><div class="modet jua" style="color:var(--ink);font-size:19px">${t.label}</div><div class="moded">${t.desc}</div></div></button>`).join('');
  app.innerHTML=`
   <div class="topbar"><button class="back" onclick="debateAnalysis()">‹ 요약</button><div class="modepill">${debate.a} ✕ ${debate.b}</div></div>
   <div style="margin-top:14px"><h2 class="q jua" style="font-size:21px;margin:0 0 4px">어떤 토론을 해볼까요?</h2>
   <p class="moded" style="margin:0 0 14px">둘이 갈릴 주제를 골라서 찾아드려요</p>${cards}</div>`;
}
// 주제 선정: 갈림 강도(축 가중치) + 다양성(약간의 무작위) — MMR 간이판
function startDebateCards(theme){
  debate.theme=theme;const A=debate.a,B=debate.b;
  const items=themeItems(theme);
  let split=items.filter(it=>{const la=dLean(A,[it.a,it.b]),lb=dLean(B,[it.a,it.b]);return la>-1&&lb>-1&&la!==lb;});
  if(split.length<3){debate.agree=true;debate.deck=rs(items).slice(0,8);debate.i=0;return renderDebateCard();}
  debate.agree=false;
  split.forEach(it=>{it._w=(AXW[it.a.ax]||1)+Math.random()*0.5;}); // 강도 + 신선함
  split.sort((x,y)=>y._w-x._w);
  debate.deck=split.slice(0,Math.min(12,split.length));
  debate.i=0;renderDebateCard();
}
function renderDebateCard(){
  const it=debate.deck[debate.i],A=debate.a,B=debate.b,opts=[it.a,it.b];
  const la=Math.max(0,dLean(A,opts)),lb=Math.max(0,dLean(B,opts));
  const meta=themeMeta(debate.theme),isTalk=debate.theme==='relation';
  const pred=debate.agree
    ?`<div class="reveal-row"><div class="person l"><div class="nm">${A} & ${B} 아마</div><span class="pem">${opts[la].em}</span><div class="pl">${opts[la].lab}</div></div></div>`
    :`<div class="reveal-row">
        <div class="person l"><div class="nm">${A}는 보통</div><span class="pem">${opts[la].em}</span><div class="pl">${opts[la].lab}</div></div>
        <div class="person r"><div class="nm">${B}는 보통</div><span class="pem">${opts[lb].em}</span><div class="pl">${opts[lb].lab}</div></div>
      </div>`;
  const vtxt=debate.agree?'💚 잘 통하는 주제!':'💥 여기서 갈릴 거예요 — 누가 맞는지 토론 ㄱㄱ!';
  const gtext=isTalk?`${it.note}<br><b style="color:var(--pink)">왜 그렇게 생각하는지</b> 서로 이유를 말해보세요.`:it.note;
  app.innerHTML=`
   <div class="topbar"><button class="back" onclick="debateThemeSelect()">‹ 주제</button><div class="modepill">토론 ${debate.i+1}/${debate.deck.length}</div></div>
   <span class="catpill">${it.cat||meta.pill}</span>
   <h2 class="q jua">${it.q}</h2>
   ${pred}
   <div class="verdict jua ${debate.agree?'same':'diff'}" style="font-size:15px">${vtxt}</div>
   <div class="guide"><div class="gt jua"><span>${isTalk?'🗣️':'🔥'}</span>${isTalk?'이렇게 토론해봐요':'쟁점'}</div><div class="gx">${gtext}</div></div>
   <button class="btn btn-full" onclick="debateNext()">${debate.i+1<debate.deck.length?'다음 주제 →':'토론 끝내기 ✨'}</button>`;
}
function debateNext(){debate.i++;debate.i<debate.deck.length?renderDebateCard():debateDone();}
function debateDone(){
  app.innerHTML=`
   <div class="topbar"><button class="back" onclick="home()">‹ 홈</button><div class="modepill">💑 토론 끝</div></div>
   <div class="center float" style="text-align:center">
     <div style="font-size:66px;animation:popIn .5s ease both">🎀</div>
     <h2 class="jua" style="font-size:28px;color:var(--ink);margin:18px 0 0">토론 끝!</h2>
     <p class="res-tag" style="margin-top:12px">서로 다른 생각을 나누는 게<br>가장 따뜻한 대화예요 💛</p>
     <button class="btn btn-full" style="max-width:280px;margin:20px auto 0" onclick="setupDebate()">다른 조합으로 또 하기 🔄</button>
     <button class="btn btn-soft" style="max-width:280px;margin:10px auto 0" onclick="home()">처음으로</button>
   </div>`;
}

    :`<div class="big">🎯</div><div class="who jua">${B} 차례</div><div class="warn">${A}님이 뭐라고 답했을지 맞혀보세요!<br>(${A}님은 옆에서 구경해도 OK)</div><button class="btn btn-full" onclick="guessCard()">맞혀볼게요</button>`;

}
function guessCard(){
  const it=guess.deck[guess.i],A=guess.names[0],B=guess.names[1];
  const head=guess.phase==='A'?`${A} · 솔직하게`:`${B} · ${A} 답 맞히기`;
  app.innerHTML=`
   <div class="topbar"><div class="modepill">${head}</div><div class="modepill">${guess.i+1}/${guess.deck.length}</div></div>
   <div class="progress"><i style="width:${guess.i/guess.deck.length*100}%"></i></div>

   </div>`;

function guessPick(i){
  if(guess.phase==='A')guess.real[guess.i]=i;else guess.pred[guess.i]=i;
  guess.i++;
  if(guess.i<guess.deck.length)guessCard();
  else if(guess.phase==='A'){guess.phase='B';guess.i=0;guessIntro();}
  else guessReveal();
}
function guessReveal(){
  const A=guess.names[0],B=guess.names[1];
  let correct=0;guess.deck.forEach(function(it,k){if(guess.real[k]===guess.pred[k])correct++;});
  const total=guess.deck.length,pct=Math.round(correct/total*100);
  let v,e;

  else{v='의외로 모르는 게 많았어요?! 지금부터 알아가요';e='😳';}
  const rows=guess.deck.map(function(it,k){
    const ok=guess.real[k]===guess.pred[k];
    const real=(guess.real[k]===0?it.a:it.b).lab.replace(/<br>/g,' ');
    const pred=(guess.pred[k]===0?it.a:it.b).lab.replace(/<br>/g,' ');
    return `<div class="grow ${ok?'gok':'gbad'}"><div class="gq">${it.q}</div>
      <div class="gres"><span class="gtick">${ok?'✓':'✗'}</span><span class="gtxt">${ok?`둘 다 "${real}"`:`실제 "${real}" · 예측 "${pred}"`}</span></div></div>`;
  }).join('');

   <div class="panel float" style="margin-top:14px;text-align:center">
     <div style="font-size:58px;animation:popIn .5s ease both">${e}</div>
     <div class="res-type jua" style="font-size:44px">${pct}%</div>
     <div class="res-tag" style="color:var(--ink);font-size:16px;margin-bottom:8px">${v}</div>
     <div class="bar" style="text-align:left"><div class="lbl"><span>맞힌 답 ${correct} / ${total}</span><span style="color:var(--ink2)">${B} → ${A}</span></div><div class="track"><div class="fill" style="width:${pct}%;background:var(--coral)"></div></div></div>
   </div>
   <div style="margin-top:14px">${rows}</div>
   <div class="guide"><div class="gt jua"><span>💬</span>틀린 것부터 얘기해봐요</div><div class="gx">"이건 왜 이렇게 생각했어?" — 의외였던 답이 가장 재밌는 대화가 돼요.</div></div>
   <button class="btn btn-full" style="margin-top:14px" onclick="swapGuess()">역할 바꿔서 또 하기 🔄</button>
   <button class="btn btn-soft" onclick="home()">처음으로</button>`;
}

}

function iWrap(ctx,text,maxW){
  const out=[],words=(text||'').split(' ');let line='';
  for(let i=0;i<words.length;i++){const w=words[i],t=line?line+' '+w:w;
    if(ctx.measureText(t).width<=maxW){line=t;continue;}
    if(line){out.push(line);line=w;}
    while(ctx.measureText(line).width>maxW&&line.length>1){let c=line.length-1;while(c>1&&ctx.measureText(line.slice(0,c)).width>maxW)c--;out.push(line.slice(0,c));line=line.slice(c);}
  }
  if(line)out.push(line);return out;
}
function iRound(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawInstaCard(){

  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#C24E7E';ctx.font='600 42px Jua, sans-serif';ctx.fillText('논쟁의 민족', W/2, 104);
  ctx.fillStyle='#9A86A4';ctx.font='28px "Gowun Dodum", sans-serif';ctx.fillText('같은 상황, 다른 생각 · '+(insta.cat||'관점 토론'), W/2, 150);
  ctx.fillStyle='#3A2E45';ctx.font='66px Jua, sans-serif';
  const lines=iWrap(ctx,insta.q,940).slice(0,4),lineH=86,cy=380,first=cy-(lines.length-1)*lineH/2;
  lines.forEach(function(ln,i){ctx.fillText(ln,W/2,first+i*lineH);});
  const cardW=452,cardH=300,cardY=560,lx=64,rx=W-64-cardW;
  function card(x,fill,bord,emoji,lab,inkc){
    ctx.fillStyle=fill;iRound(ctx,x,cardY,cardW,cardH,40);ctx.fill();ctx.lineWidth=4;ctx.strokeStyle=bord;ctx.stroke();
    ctx.fillStyle='#3A2E45';ctx.font='120px sans-serif';ctx.fillText(emoji,x+cardW/2,cardY+150);
    ctx.fillStyle=inkc;ctx.font='44px Jua, sans-serif';
    const ll=iWrap(ctx,lab,cardW-56).slice(0,2);ll.forEach(function(t,i){ctx.fillText(t,x+cardW/2,cardY+225+i*52);});
  }
  card(lx,'#FFE3D8','#FFD0BD',insta.a.em,insta.a.lab,'#C7593A');

  ctx.beginPath();ctx.arc(W/2,cardY+cardH/2,58,0,7);ctx.fillStyle='#fff';ctx.fill();ctx.lineWidth=4;ctx.strokeStyle='#F0E0E8';ctx.stroke();
  ctx.fillStyle='#FF7AA6';ctx.font='44px Jua, sans-serif';ctx.fillText('VS',W/2,cardY+cardH/2+16);
  ctx.fillStyle='#6B5A74';ctx.font='44px "Gowun Dodum", sans-serif';ctx.fillText('당신의 선택은? 댓글로 토론 🔥',W/2,952);
  ctx.fillStyle='#C24E7E';ctx.font='40px Jua, sans-serif';ctx.fillText(insta.handle||'@mbti_nonjaeng',W/2,1014);
}
function saveInsta(){const cv=document.getElementById('icv');if(!cv)return;const a=document.createElement('a');a.download='관점토크_'+Date.now()+'.png';a.href=cv.toDataURL('image/png');a.click();toast('이미지 저장됐어요! 인스타에 올려보세요 📸');}

/* ===== 커뮤니티 (Supabase 백엔드) ===== */
const SB_URL='https://aklvacriteprocjmqndl.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrbHZhY3JpdGVwcm9jam1xbmRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NTEwMzAsImV4cCI6MjA5ODIyNzAzMH0.Xong7ScNZlGYLY1v--73Zk5TNeoXMilPCpP1ZTo9PY8';
let comm={items:[],sort:'hot',voted:{}};
try{comm.voted=JSON.parse(localStorage.getItem('nj_voted')||'{}');}catch(e){}
function loadSB(cb){if(window.supabase)return cb();var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';s.onload=function(){cb();};s.onerror=function(){cb('err');};document.head.appendChild(s);}
function sbClient(){if(!window._sb)window._sb=window.supabase.createClient(SB_URL,SB_ANON);return window._sb;}
function setupCommunity(){
  app.innerHTML=`<div class="topbar"><button class="back" onclick="home()">‹ 홈</button><div class="modepill">👥 커뮤니티</div></div>
   <div class="center turn float"><div class="big">⏳</div><div class="warn">불러오는 중…</div></div>`;
  loadSB(function(err){err?commError('연결 실패 😢 인터넷을 확인해주세요'):commLoad();});
}
async function commLoad(){
  try{const sb=sbClient();const{data,error}=await sb.from('submissions').select('*').order('created_at',{ascending:false}).limit(100);
    if(error)throw error;comm.items=data||[];renderCommunity();
  }catch(e){const m=(e&&e.message)||(''+e);commError(/submission|does not exist|schema cache/i.test(m)?'아직 DB 테이블이 없어요. 운영자가 schema.sql을 실행하면 바로 열려요!':'불러오기 실패: '+m);}
}
function commError(msg){
  app.innerHTML=`<div class="topbar"><button class="back" onclick="home()">‹ 홈</button><div class="modepill">👥 커뮤니티</div></div>
   <div class="panel float" style="margin-top:14px;text-align:center"><div style="font-size:48px">😢</div><div class="res-tag" style="margin-top:10px">${msg}</div><button class="btn btn-full" onclick="setupCommunity()">다시 시도</button></div>`;
}
function renderCommunity(){
  const items=comm.items.slice();
  if(comm.sort==='hot')items.sort((a,b)=>((b.votes_a+b.votes_b)-(a.votes_a+a.votes_b)));
  else items.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const rows=items.length?items.map(commRow).join(''):`<p class="res-tag" style="margin-top:20px">아직 글이 없어요.<br>첫 논쟁거리를 올려보세요! 🔥</p>`;
  app.innerHTML=`
   <div class="topbar"><button class="back" onclick="home()">‹ 홈</button><div class="modepill">👥 커뮤니티</div></div>
   <div style="display:flex;gap:8px;margin:12px 0 10px">
     <button class="btn ${comm.sort==='hot'?'btn-next':'btn-soft'}" style="flex:1;padding:11px;font-size:14px;margin:0" onclick="commSort('hot')">🔥 인기순</button>
     <button class="btn ${comm.sort==='new'?'btn-next':'btn-soft'}" style="flex:1;padding:11px;font-size:14px;margin:0" onclick="commSort('new')">🆕 최신순</button>
   </div>
   <button class="btn btn-full" style="margin:0 0 12px" onclick="commForm()">➕ 내 논쟁거리 올리기</button>
   <div>${rows}</div>`;
}
function commSort(s){comm.sort=s;renderCommunity();}
function commRow(it){
  const total=it.votes_a+it.votes_b,pa=total?Math.round(it.votes_a/total*100):50,voted=comm.voted[it.id];
  const res=function(side,pct,cnt,ink){return voted?`<div style="font-size:12px;color:${ink};margin-top:4px">${pct}% · ${cnt}표</div>`:'';};
  return `<div class="grow" style="margin-bottom:10px">
    <div class="gq" style="font-size:15px;margin-bottom:8px">${esc(it.q)} <span style="color:var(--ink2);font-size:12px">· ${esc(it.nick||'익명')}</span></div>
    <div style="display:flex;gap:8px">
      <button class="optbtn totcard c-coral" style="flex:1;padding:12px 6px" ${voted?'disabled':''} onclick="commVote(${it.id},'a')"><div style="font-size:24px">${it.a_em}</div><div class="tot-lab jua" style="font-size:13.5px">${esc(it.a_lab)}</div>${res('a',pa,it.votes_a,'var(--coralInk)')}</button>
      <button class="optbtn totcard c-lav" style="flex:1;padding:12px 6px" ${voted?'disabled':''} onclick="commVote(${it.id},'b')"><div style="font-size:24px">${it.b_em}</div><div class="tot-lab jua" style="font-size:13.5px">${esc(it.b_lab)}</div>${res('b',100-pa,it.votes_b,'var(--lavInk)')}</button>
    </div>
    <div style="text-align:right;margin-top:5px"><button class="back" style="font-size:11px;color:#C0AEC8;padding:2px 4px" onclick="commReport(${it.id})">🚩 신고</button></div>
  </div>`;
}
async function commVote(id,side){
  if(comm.voted[id])return;
  comm.voted[id]=side;localStorage.setItem('nj_voted',JSON.stringify(comm.voted));
  const it=comm.items.find(x=>x.id===id);if(it){side==='a'?it.votes_a++:it.votes_b++;}
  renderCommunity();
  try{await sbClient().rpc('vote',{sid:id,side:side});}catch(e){}
}
async function commReport(id){
  if(!confirm('이 글을 신고할까요? (5회 누적 시 자동 숨김)'))return;
  try{await sbClient().rpc('report',{sid:id});toast('신고했어요. 감사합니다 🙏');}catch(e){}
}
function commForm(){
  app.innerHTML=`
   <div class="topbar"><button class="back" onclick="setupCommunity()">‹ 뒤로</button><div class="modepill">➕ 올리기</div></div>
   <div class="panel float" style="margin-top:14px">
     <h2 class="q jua" style="font-size:19px;margin:0 0 14px">정답 없는 논쟁거리를 올려보세요 🔥</h2>
     <input class="field" id="cq" placeholder="질문 (예: 강아지 상하체 어떻게 나눠?)" maxlength="80">
     <div style="display:flex;gap:8px"><input class="field" id="cae" value="🅰️" style="width:58px;text-align:center" maxlength="4"><input class="field" id="cal" placeholder="선택 A" maxlength="20"></div>
     <div style="display:flex;gap:8px"><input class="field" id="cbe" value="🅱️" style="width:58px;text-align:center" maxlength="4"><input class="field" id="cbl" placeholder="선택 B" maxlength="20"></div>
     <input class="field" id="cnk" placeholder="닉네임 (선택)" maxlength="10">
     <button class="btn btn-full" onclick="commSubmit()">올리기 🔥</button>
     <p class="foot" style="margin-top:12px">인기 얻으면 인스타에 실릴 수도 있어요! 부적절한 글은 신고로 숨김 처리됩니다.</p>
   </div>`;
}
async function commSubmit(){
  const q=document.getElementById('cq').value.trim(),al=document.getElementById('cal').value.trim(),bl=document.getElementById('cbl').value.trim();
  const ae=document.getElementById('cae').value.trim()||'🅰️',be=document.getElementById('cbe').value.trim()||'🅱️',nk=document.getElementById('cnk').value.trim()||'익명';
  if(q.length<4||!al||!bl){toast('질문(4자 이상)과 선택지 A·B를 채워주세요');return;}
  try{const{error}=await sbClient().from('submissions').insert({q:q,a_lab:al,a_em:ae,b_lab:bl,b_em:be,nick:nk});
    if(error)throw error;toast('올렸어요! 🔥');setupCommunity();
  }catch(e){toast('실패: '+(e.message||e));}
}

/* ===== 헬퍼 ===== */
function axc(a){return {S:'#2BBE8A',N:'#9385F0',T:'#5BA8E8',F:'#FF7AA6',E:'#FF8A6B',I:'#7FD0CB',J:'#9385F0',P:'#FFC36B'}[a]||'#FF8A6B';}
function typeTag(t){const m={E:'함께 충전형',I:'혼자 충전형',S:'현실·디테일형',N:'상상·가능성형',T:'논리·효율형',F:'마음·관계형',J:'계획형',P:'즉흥형'};return t.split('').map(c=>m[c]).join(' · ')+' 성향이에요 :)';}

if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
checkIncoming();
</script>
